<div>
    <header class="font-nunito !text-2xl font-semibold mb-3">Lot Payment</header>
    <div>
        <table class="w-full border-collapse">
            <thead class="bg-white !rounded-md border-b-1">
                <tr class="text-left">
                    <th class="py-2 px-1 rounded-tl-lg ">Lot Number</th>
                    <th class="py-2 px-1 text-center">Amortization</th>
                    <th class="py-2 px-1 rounded-tr-lg text-center">Acceleration</th>
                </tr>
            </thead>
            <tbody class="bg-white">
                @for (lots of paymentLots; track $index) {
                    <tr class="">
                        <td class="py-1 px-1 pl-5">{{lots.lot}}</td>
                        <td class="py-1 px-1 text-center">{{lots.amt_amort}}</td>
                        <td class="py-1 px-1 text-center">{{lots.amt_spotcash}}</td>
                    </tr>
                }
            </tbody>
        </table>
        <div class="flex-col gap-3 mt-3">
            <span class="font-nunito font-extrabold text-lg text-black">
                Payment Allocation
            </span>
           <div class="flex flex-row w-full gap-4">
                <label class="flex w-full items-center gap-3 bg-white/90 px-4 py-3 rounded-xl cursor-pointer">
                    <input type="radio" name="allocation" value="equal" checked class="accent-primary" (change)="hideAllocate()"/>
                    <span class="font-semibold">Split Equally</span>
                </label>
                <label class="flex w-full items-center gap-3 bg-white/90 px-4 py-3 rounded-xl cursor-pointer">
                    <input type="radio" name="allocation" value="allocate" class="accent-primary" (change)="displayAllocate()"/>
                    <span class="font-semibold">Allocate</span>
                </label>
           </div>
           <div>
                Amount
                <div class="input-text-container">
                    <lucide-icon [img]="CashIcon"></lucide-icon>
                    <input type="text" class="input-field">
                </div>
            </div>
            @if (displayAllocation) {
                <div class="flex flex-col gap-3">
                    <header class="font-semibold">Allocate Payment</header>

                    <form [formGroup]="allocationForm">
                    <div formArrayName="allocations" class="flex flex-col gap-2">
                        <div
                        *ngFor="let allocation of allocations.controls; let i = index"
                        [formGroupName]="i"
                        class="flex gap-2 items-center bg-white p-3 rounded-lg"
                        >
                        <span class="w-1/3 font-semibold">
                            Lot {{ allocation.value.lot }}
                        </span>

                        <input
                            type="number"
                            formControlName="amount"
                            placeholder="Enter amount"
                            class="input-field w-full"
                        />
                        </div>
                    </div>
                    </form>
                </div>
            }
            <button class="bg-accent text-white">Confirm Payment</button>
            
        </div>
    </div>
</div>
